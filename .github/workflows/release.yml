# .github/workflows/release.yml

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag-provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit belongs to master or develop
        run: |
          git fetch origin master develop
          if git branch -r --contains "$GITHUB_SHA" | grep -Eq "origin/(master|develop)$"; then
            echo "Tag commit is on an approved branch."
          else
            echo "Tag commit is not on master or develop."
            exit 1
          fi

      - name: Verify token analytics reports exist for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPORT="docs/releases/token-report-v${VERSION}.html"
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: Token analytics report not found: $REPORT"
            echo "The token analyst (G9) must run before tagging a release."
            echo "Generate the report, commit it to the release branch, then re-tag."
            exit 1
          fi
          echo "Token report verified: $REPORT"

      - name: Verify workflow evaluation report exists for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPORT="docs/releases/workflow-report-v${VERSION}.html"
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: Workflow evaluation report not found: $REPORT"
            echo "The workflow analyst (G10) must run before tagging a release."
            echo "Generate the report, commit it to the release branch, then re-tag."
            exit 1
          fi
          echo "Workflow report verified: $REPORT"

  generate-sboms:
    needs: verify-tag-provenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install production dependencies only
        run: poetry install --only main

      - name: Generate CycloneDX 1.6 SBOM
        run: |
          VERSION="${GITHUB_REF_NAME}"
          poetry run cyclonedx-py poetry \
            --spec-version 1.6 \
            --output-format JSON \
            --no-dev \
            -o "sbom-validator-${VERSION}.cdx.json"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SPDX 2.3 SBOM
        run: |
          VERSION="${GITHUB_REF_NAME}"
          syft scan .venv \
            --source-name "sbom-validator" \
            --source-version "${VERSION#v}" \
            --output "spdx-json=sbom-validator-${VERSION}.spdx.json"

      - name: Generate checksums
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sha256sum "sbom-validator-${VERSION}.cdx.json"  > "sbom-validator-${VERSION}.cdx.json.sha256"
          sha256sum "sbom-validator-${VERSION}.spdx.json" > "sbom-validator-${VERSION}.spdx.json.sha256"

      - name: Upload SBOMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-validator-${{ github.ref_name }}.cdx.json
            sbom-validator-${{ github.ref_name }}.cdx.json.sha256
            sbom-validator-${{ github.ref_name }}.spdx.json
            sbom-validator-${{ github.ref_name }}.spdx.json.sha256

  build-linux:
    needs: verify-tag-provenance
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Build binary
        run: poetry run pyinstaller sbom_validator.spec

      - name: Smoke test binary
        run: bash scripts/smoke-test-binary.sh ./dist/sbom-validator

      - name: Generate checksums
        run: sha256sum dist/sbom-validator > dist/sbom-validator.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sbom-validator
            dist/sbom-validator.sha256

  build-windows:
    needs: verify-tag-provenance
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --with dev

      - name: Build binary
        run: poetry run pyinstaller sbom_validator.spec

      - name: Smoke test binary
        run: bash scripts/smoke-test-binary.sh ./dist/sbom-validator.exe

      - name: Generate checksums
        run: sha256sum dist/sbom-validator.exe > dist/sbom-validator.exe.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sbom-validator.exe
            dist/sbom-validator.exe.sha256
